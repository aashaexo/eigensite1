<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Eigen Ecosystem</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- React + ReactDOM from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- X / Twitter widgets for embedded tweets -->
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
  </head>
  <body style="margin:0;">
    <div id="root"></div>

    <!-- Your JSX component file -->
    <script type="text/babel" src="eigen-ecosystem (1).jsx"></script>

    <!-- Mount the app -->
    <script type="text/babel">
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<EigenEcosystem />);
    </script>
  </body>
</html>
